<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 20px;
  background: #111827;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* Subtitle */
.subtitle {
  text-align: center;
  margin-top: -10px;
  margin-bottom: 20px;
  color: #9ca3af;
}

/* Slider */
.slider {
  position: relative;
  width: 90%;
  margin: auto;
  overflow: hidden;
}

.slides {
  display: flex;
  transition: transform 0.5s ease-in-out;
}

.slide {
  flex: 0 0 300px;
  margin: 10px;
}

iframe {
  width: 100%;
  height: 180px;
  border-radius: 10px;
  border: none;
}

/* Buttons */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  font-size: 18px;
  border-radius: 50%;
}

.btn-left { left: 0; }
.btn-right { right: 0; }

footer {
  text-align: center;
  padding: 15px;
  margin-top: 20px;
  background: #111827;
  color: #6b7280;
}
</style>

</head>

<body>

<header>🌑 Eclipse Gallery</header>
<div class="subtitle">A glimpse of what we planned before</div>

<div class="slider">

  </div>

<button class="btn btn-left" onclick="moveSlide(-1)">❮</button> <button class="btn btn-right" onclick="moveSlide(1)">❯</button>

</div>

<footer>© 2026 Eclipse Gallary</footer>

<script>
let index = 0;

function moveSlide(direction) {
  const slides = document.getElementById("slides");
  const totalSlides = slides.children.length;
  const visibleSlides = 3;
  const slideWidth = 320;

  index += direction;

  if (index < 0) index = 0;
  if (index > totalSlides - visibleSlides) {
    index = totalSlides - visibleSlides;
  }

  slides.style.transform = "translateX(-" + (index * slideWidth) + "px)";
}
</script>

</body>
